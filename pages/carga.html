<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar Partido - TC Hockey</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <nav class="navbar">
        <img src="../assets/image/logo.jpg" alt="Logo TC Hockey" class="logo">
        <ul class="nav-links">
            <li><a href="../index.html">Historial</a></li>
            <li><a href="carga.html" class="active">Cargar Partido</a></li>
        </ul>
    </nav>

    <div class="container-dashboard">
        <div class="header-stats">
            <h2>Subir Nuevo Partido</h2>
            <p class="subtitle">Completá los datos y subí el archivo de LongoMatch o Timeline (Opcional)</p>
        </div>

        <div class="card-stat" style="display: block;">
            <form id="form-carga" style="display: flex; flex-direction: column; gap: 15px;">
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label><b>Equipo 1 (Nuestra Columna):</b></label>
                        <input type="text" id="input-mi-equipo" placeholder="Ej: Mi Equipo" required style="width: 100%; padding: 10px; margin-top: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label><b>Equipo 2 (Columna Rival):</b></label>
                        <input type="text" id="input-rival" placeholder="Ej: Mar del Plata Club" required style="width: 100%; padding: 10px; margin-top: 5px;">
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label><b>Torneo o Categoría:</b></label>
                        <input type="text" id="input-torneo" placeholder="Ej: Torneo Oficial" required style="width: 100%; padding: 10px; margin-top: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <label><b>Fecha:</b></label>
                        <input type="date" id="input-fecha" required style="width: 100%; padding: 10px; margin-top: 5px;">
                    </div>
                </div>

                <div>
                    <label><b>ID de YouTube:</b></label>
                    <input type="text" id="input-youtube" placeholder="Ej: M7lc1UVf-VE" required style="width: 100%; padding: 10px; margin-top: 5px;">
                </div>

                <div style="margin-top: 10px; background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px dashed var(--tc-blue);">
                    <label><b>Archivo de Análisis (.lgm o .xml) (Opcional):</b></label><br>
                    <input type="file" id="input-xml" accept=".lgm, .xml" style="margin-top: 10px;">
                </div>

                <button type="submit" id="btn-submit" class="btn-danger" style="margin-top: 10px; font-size: 1.1rem; padding: 15px; cursor: pointer;">
                    🚀 Guardar en Base de Datos
                </button>
                
                <p id="mensaje-estado" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc } from '../assets/js/firebase.js';

        const form = document.getElementById('form-carga');
        const mensaje = document.getElementById('mensaje-estado');
        const btn = document.getElementById('btn-submit');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const file = document.getElementById('input-xml').files[0];

            btn.disabled = true;
            btn.textContent = "Procesando...";
            mensaje.style.color = "blue";
            
            // Mensaje dinámico según si hay archivo o no
            mensaje.textContent = file ? "Leyendo archivo y conectando con la nube..." : "Guardando partido sin cortes...";

            // Armamos el objeto base con los datos del formulario
            const partidoNuevo = {
                mi_equipo: document.getElementById('input-mi-equipo').value,
                rival: document.getElementById('input-rival').value,
                fecha: document.getElementById('input-fecha').value,
                torneo: document.getElementById('input-torneo').value,
                youtube_id: document.getElementById('input-youtube').value,
                creado_el: new Date()
            };

            // Función auxiliar para subir a Firebase
            const guardarEnBaseDeDatos = async (datos) => {
                try {
                    await addDoc(collection(db, "partidos"), datos);
                    mensaje.style.color = "green";
                    mensaje.textContent = "¡Éxito! Redirigiendo al historial...";
                    setTimeout(() => {
                        window.location.href = "../index.html";
                    }, 2000);
                } catch (error) {
                    console.error("Error al guardar: ", error);
                    mensaje.style.color = "red";
                    mensaje.textContent = "Error al guardar en la base de datos. Revisá la consola.";
                    btn.disabled = false;
                    btn.textContent = "Reintentar";
                }
            };

            // Evaluamos si hay archivo para procesar
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(evento) {
                    try {
                        const contenidoArchivo = evento.target.result;
                        let estadisticas;

                        if (contenidoArchivo.trim().startsWith("{")) {
                            estadisticas = procesarLGM(contenidoArchivo);
                        } else {
                            estadisticas = procesarXML(contenidoArchivo);
                        }

                        // Agregamos las estadísticas al objeto y guardamos
                        partidoNuevo.estadisticas = estadisticas;
                        await guardarEnBaseDeDatos(partidoNuevo);

                    } catch (error) {
                        console.error("Error al procesar archivo: ", error);
                        mensaje.style.color = "red";
                        mensaje.textContent = "Error al procesar el archivo de cortes. Revisá la consola.";
                        btn.disabled = false;
                        btn.textContent = "Reintentar";
                    }
                };
                reader.readAsText(file);
            } else {
                // Si NO hay archivo, mandamos las estadísticas como un objeto vacío
                partidoNuevo.estadisticas = {}; 
                await guardarEnBaseDeDatos(partidoNuevo);
            }
        });

        function procesarLGM(jsonString) {
            const data = JSON.parse(jsonString);
            const eventos = data.Timeline; 
            const resultado = {};

            for (let i = 0; i < eventos.length; i++) {
                let ev = eventos[i];
                if (!ev.$type || !ev.$type.includes("TimelineEvent")) continue;

                let categoria = ev.Name.replace(/\s\d+$/, ""); 
                let tiempo = ev.Start / 1000; 

                let tags = [];
                if (ev.Tags && ev.Tags.length > 0) {
                    for (let j = 0; j < ev.Tags.length; j++) {
                        tags.push(ev.Tags[j].Value);
                    }
                }

                if (!resultado[categoria]) resultado[categoria] = [];
                resultado[categoria].push({ t: tiempo, d: tags });
            }
            return resultado;
        }

        function procesarXML(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const eventos = xmlDoc.getElementsByTagName("evento"); 
            const resultado = {}; 

            for (let i = 0; i < eventos.length; i++) {
                let categoria = eventos[i].getElementsByTagName("categoria")[0].textContent;
                let tiempo = parseFloat(eventos[i].getElementsByTagName("tiempo")[0].textContent); 
                
                let nodosTags = eventos[i].getElementsByTagName("descriptor");
                let tags = [];
                for (let j = 0; j < nodosTags.length; j++) {
                    tags.push(nodosTags[j].textContent);
                }

                if (!resultado[categoria]) resultado[categoria] = []; 
                resultado[categoria].push({ t: tiempo, d: tags });
            }
            return resultado;
        }
    </script>
</body>
</html>
