<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Análisis - TC Hockey</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* --- LAYOUT SIEMPRE EN COLUMNA (Video arriba, cortes abajo) --- */
        .layout-principal {
            display: flex;
            flex-direction: column; 
            gap: 25px;
            width: 100%;
        }

        /* --- REPRODUCTOR (16:9 Automático) --- */
        .columna-video {
            width: 100%;
        }
        
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9; /* Fuerza el formato panorámico */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(28, 44, 84, 0.15);
        }

        .video-wrapper iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        /* --- CARPETAS Y BOTONES --- */
        .columna-cortes-scroll {
            width: 100%;
            max-height: 600px; /* Vuelve el límite de altura original */
            overflow-y: auto; /* Vuelve el scroll original */
            padding-right: 10px;
        }

        .cat-details {
            background: #ffffff;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }
        
        .cat-details > summary {
            background: var(--tc-blue, #1c2c54);
            color: #ffffff;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            list-style: none;
            border-radius: 10px;
        }

        .cat-details > summary::-webkit-details-marker { display: none; }
        
        .cat-details[open] > summary {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .desc-details {
            margin: 12px;
            background: #f8f9fa;
            border-left: 4px solid var(--tc-red, #c9242b);
            border-radius: 6px;
            padding: 5px 15px;
        }
        
        .desc-details > summary {
            color: #333;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 0;
            list-style: none;
            border-bottom: 1px dashed #ccc;
        }
        
        .desc-details > summary::-webkit-details-marker { display: none; }
        
        .botones-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding: 15px 0;
        }
        
        .timestamp-btn {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: var(--tc-blue, #1c2c54);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .timestamp-btn:hover {
            background: var(--tc-blue, #1c2c54);
            color: #ffffff;
            border-color: var(--tc-blue, #1c2c54);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="../assets/image/logo.jpg" alt="Logo TC Hockey" class="logo">
        <ul class="nav-links">
            <li><a href="../index.html">Historial</a></li>
            <li><a href="video.html" class="active">Video</a></li>
            <li><a href="estadisticas.html">Estadísticas</a></li>
        </ul>
    </nav>

    <div class="container-dashboard">
        <h2 id="titulo-partido" style="color: var(--tc-blue); margin-bottom: 20px; font-size: 1.6rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">Cargando video...</h2>
        
        <div class="layout-principal">
            
            <!-- REPRODUCTOR DE VIDEO (SIEMPRE ARRIBA) -->
            <div class="columna-video">
                <div class="video-wrapper">
                    <div id="player"></div>
                </div>
            </div>

            <!-- CARPETAS DE ANÁLISIS (SIEMPRE ABAJO) -->
            <div class="columna-cortes-scroll">
                <h3 style="margin-top: 0; color: var(--tc-blue); font-size: 1.2rem;">📊 Cortes del Partido</h3>
                <div id="cortes-container">
                    <p style="color: #666;">Buscando datos...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- EL JAVASCRIPT INTACTO -->
    <script type="module">
        import { db, doc, getDoc } from '../assets/js/firebase.js';

        let player;
        let videoIdLimpio = ''; 
        const partidoId = sessionStorage.getItem('partidoSeleccionadoId');

        window.onYouTubeIframeAPIReady = () => {
            if (videoIdLimpio) {
                player = new YT.Player('player', {
                    height: '360',
                    width: '100%',
                    videoId: videoIdLimpio,
                    playerVars: { 'playsinline': 1 }
                });
            }
        };

        async function cargarAnalisis() {
            if (!partidoId) {
                window.location.href = "../index.html";
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "partidos", partidoId));
                
                if (docSnap.exists()) {
                    const partido = docSnap.data();
                    const eq1 = partido.mi_equipo || 'Nuestro Equipo';
                    const eq2 = partido.rival || 'Rival';
                    
                    document.getElementById('titulo-partido').textContent = `${eq1} vs ${eq2} - ${partido.fecha}`;

                    let rawId = partido.youtube_id;
                    if (rawId.includes('v=')) {
                        videoIdLimpio = rawId.split('v=')[1].substring(0, 11);
                    } else if (rawId.includes('youtu.be/')) {
                        videoIdLimpio = rawId.split('youtu.be/')[1].substring(0, 11);
                    } else {
                        videoIdLimpio = rawId; 
                    }

                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);

                    const container = document.getElementById('cortes-container');
                    container.innerHTML = '';

                    const agrupado = {};

                    for (const [categoria, cortes] of Object.entries(partido.estadisticas)) {
                        agrupado[categoria] = {};
                        
                        cortes.forEach((corte, index) => {
                            const numCorteOriginal = index + 1; 
                            
                            if (corte.d && corte.d.length > 0) {
                                corte.d.forEach(descriptor => {
                                    if (!agrupado[categoria][descriptor]) {
                                        agrupado[categoria][descriptor] = [];
                                    }
                                    agrupado[categoria][descriptor].push({ ...corte, numCorteOriginal });
                                });
                            } else {
                                if (!agrupado[categoria]['General']) {
                                    agrupado[categoria]['General'] = [];
                                }
                                agrupado[categoria]['General'].push({ ...corte, numCorteOriginal });
                            }
                        });
                    }

                    const categoriasOrdenadas = Object.keys(agrupado).sort();

                    categoriasOrdenadas.forEach(cat => {
                        const catDetails = document.createElement('details');
                        catDetails.className = 'cat-details';
                        
                        const catSummary = document.createElement('summary');
                        catSummary.innerHTML = `📁 ${cat}`;
                        catDetails.appendChild(catSummary);
                        
                        const subGrupos = agrupado[cat];
                        const subGruposKeys = Object.keys(subGrupos).sort();
                        
                        subGruposKeys.forEach(desc => {
                            const cortesGrupo = subGrupos[desc];
                            
                            const descDetails = document.createElement('details');
                            descDetails.className = 'desc-details';
                            
                            const descSummary = document.createElement('summary');
                            descSummary.innerHTML = `📂 ${desc} <span style="color:#888; font-size:0.85rem;">(${cortesGrupo.length} cortes)</span>`;
                            descDetails.appendChild(descSummary);
                            
                            const divBotones = document.createElement('div');
                            divBotones.className = 'botones-container';
                            
                            cortesGrupo.forEach(corte => {
                                const btn = document.createElement('button');
                                btn.className = 'timestamp-btn';
                                btn.textContent = `▶ Corte ${corte.numCorteOriginal}`;
                                
                                btn.onclick = () => {
                                    if (player && typeof player.seekTo === 'function') {
                                        player.seekTo(corte.t, true);
                                    }
                                };
                                divBotones.appendChild(btn);
                            });
                            
                            descDetails.appendChild(divBotones);
                            catDetails.appendChild(descDetails);
                        });
                        
                        container.appendChild(catDetails);
                    });
                }
            } catch (error) {
                console.error("Error al cargar el partido:", error);
                document.getElementById('titulo-partido').textContent = "Error al cargar los datos.";
            }
        }

        cargarAnalisis();
    </script>
</body>
</html>
