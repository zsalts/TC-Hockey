<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - TC Hockey</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar">
        <img src="assets/image/logo.jpg" alt="Logo TC Hockey" class="logo">
        <ul class="nav-links">
            <li><a href="index.html" class="active">Historial</a></li>
            <li><a href="pages/carga.html">Cargar Partido</a></li>
        </ul>
    </nav>

    <div class="container-dashboard">
        <div class="header-stats" style="flex-direction: column; align-items: stretch; gap: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>Historial de Partidos</h2>
                    <p class="subtitle">Seleccioná un partido para ver los cortes, editalo o eliminalo.</p>
                </div>
                <a href="pages/carga.html" class="btn-danger" style="text-decoration: none;">+ Nuevo Partido</a>
            </div>
            
            <input type="text" id="buscador" placeholder="🔍 Buscar por equipo o torneo..." style="padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; width: 100%;">
        </div>

        <div id="lista-partidos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
            <p>Conectando con la base de datos...</p>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, doc, deleteDoc } from './assets/js/firebase.js';

        let partidosGlobal = [];

        async function cargarHistorial() {
            const listaContainer = document.getElementById('lista-partidos');
            
            try {
                const querySnapshot = await getDocs(collection(db, "partidos"));
                partidosGlobal = []; 

                if (querySnapshot.empty) {
                    listaContainer.innerHTML = '<p>No se encontraron partidos. Hacé clic en "Nuevo Partido".</p>';
                    return;
                }

                querySnapshot.forEach((documento) => {
                    partidosGlobal.push({ id: documento.id, ...documento.data() });
                });

                renderizarPartidos(partidosGlobal);

            } catch (error) {
                console.error("Error: ", error);
                listaContainer.innerHTML = '<p>Error al conectar con Firebase.</p>';
            }
        }

        function renderizarPartidos(partidos) {
            const listaContainer = document.getElementById('lista-partidos');
            listaContainer.innerHTML = '';

            if (partidos.length === 0) {
                listaContainer.innerHTML = '<p>No hay resultados para tu búsqueda.</p>';
                return;
            }

            partidos.forEach((partido) => {
                const card = document.createElement('div');
                card.className = 'card-stat';
                card.style.cursor = 'pointer';
                card.style.flexDirection = 'column';
                card.style.alignItems = 'flex-start';
                
                const equipo1 = partido.mi_equipo || 'Nuestro Equipo';
                const equipo2 = partido.rival || 'Rival';

                card.innerHTML = `
                    <div style="width: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <span class="subtitle" style="text-transform: uppercase; color: var(--tc-red); font-weight: bold;">${partido.torneo}</span>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn-editar" style="background: #f0f2f5; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #333; transition: 0.2s;">✏️ Editar</button>
                                <button class="btn-borrar" style="background: #ffebe9; border: 1px solid #ffc1c0; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #c9242b; transition: 0.2s;">🗑️ Borrar</button>
                            </div>
                        </div>
                        <h3 style="margin: 10px 0; color: var(--tc-blue); font-size: 1.3rem;">${equipo1} <br><span style="color: #666; font-size: 1rem;">vs</span> ${equipo2}</h3>
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px;">
                            <span style="color: #666; font-size: 0.9rem;">📅 ${partido.fecha}</span>
                            <span style="font-weight: bold; color: var(--tc-blue);">VER ANÁLISIS →</span>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    sessionStorage.setItem('partidoSeleccionadoId', partido.id);
                    window.location.href = 'pages/video.html';
                };

                const btnEditar = card.querySelector('.btn-editar');
                btnEditar.onclick = (e) => {
                    e.stopPropagation();
                    sessionStorage.setItem('partidoAEditarId', partido.id);
                    window.location.href = 'pages/editar.html';
                };

                const btnBorrar = card.querySelector('.btn-borrar');
                btnBorrar.onclick = async (e) => {
                    e.stopPropagation(); 
                    const confirmacion = confirm(`¿Estás seguro que querés borrar el partido ${equipo1} vs ${equipo2}? Esta acción no se puede deshacer.`);
                    if (confirmacion) {
                        try {
                            await deleteDoc(doc(db, "partidos", partido.id));
                            partidosGlobal = partidosGlobal.filter(p => p.id !== partido.id);
                            renderizarPartidos(partidosGlobal);
                        } catch (error) {
                            console.error("Error al borrar:", error);
                            alert("Hubo un problema al intentar borrar el partido.");
                        }
                    }
                };

                listaContainer.appendChild(card);
            });
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            const textoBusqueda = e.target.value.toLowerCase();
            const partidosFiltrados = partidosGlobal.filter(p => 
                (p.rival && p.rival.toLowerCase().includes(textoBusqueda)) || 
                (p.mi_equipo && p.mi_equipo.toLowerCase().includes(textoBusqueda)) || 
                p.torneo.toLowerCase().includes(textoBusqueda)
            );
            renderizarPartidos(partidosFiltrados);
        });

        cargarHistorial();
    </script>
</body>
</html>
